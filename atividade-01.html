<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01 - Formulário</title>
</head>
<body>
    <h1>Carros Elétricos</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iusu">Nome completo:</label><br>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="45" size="20" 
            placeholder="Digite seu nome completo" autocomplete="username">
        </p>
        <p>
            <label for="imodel">Modelo de carro elétrico favorito:</label><br>
            <input type="text" name="model" id="imodel" required minlength="5" maxlength="30" size="20" 
            placeholder="Ex: Tesla Model 3" autocomplete="model">
        </p>
        <p>
            <label for="isen">Crie uma senha de acesso: </label><br>
            <input type="password" name="sen" id="isen" required minlength="8" maxlength="20" size="15" placeholder="Mínimo 6 caracteres" autocomplete="current-password">

        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>


    </form>
    
</body>
</html>
